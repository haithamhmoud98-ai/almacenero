<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner de Productos</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<h1>📦 Escáner de Productos</h1>

<div id="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="scanner-frame"></div>
</div>

<button onclick="scanProduct()">📸 Escanear producto</button>
<button onclick="openModal()">➕ Añadir producto</button>

<div id="scanPreviewContainer" style="display:none; margin-top:10px;">
    <div id="previewWrapper">
        <img id="scanPreview">
        <canvas id="selectionCanvas"></canvas>
    </div>

    <p id="selectionCount"></p>

    <button onclick="confirmScan()">✅ Procesar</button>
    <button onclick="undoSelection()">↩️ Borrar última selección</button>
    <button onclick="clearSelections()">🧹 Limpiar selecciones</button>
    <button onclick="cancelScan()" style="background:red;">❌ Cancelar</button>
</div>

<p id="status"></p>
<p id="recognized"></p>

<div id="manualTextContainer" style="display:none;">
    <textarea id="manualText" placeholder="Corrige el texto detectado aquí..."></textarea>

    <button onclick="applyManualText()">🔍 Buscar con texto corregido</button>
    <button onclick="cancelManualText()" style="background:red;">❌ Ocultar</button>
</div>

<div id="result"></div>

<input id="searchInput" placeholder="🔍 Buscar producto..." oninput="searchManual()">

<div id="searchResults"></div>

<h2>📋 Lista de Picking</h2>
<p id="progress"></p>
<p id="nextItem"></p>
<div id="pickingList"></div>

<canvas id="canvas" style="display:none;"></canvas>

<div id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✖</span>

        <h3>Añadir producto</h3>

        <input id="name" placeholder="Nombre del producto">

        <button onclick="toggleCamera()">📷 Tomar foto</button>

        <video id="modalCamera" autoplay playsinline style="display:none;"></video>

        <img id="preview" style="display:none; width:100%; border-radius:10px; margin-top:10px;">

        <button id="removeImageBtn" onclick="removeImage()" style="display:none; background:red;">
            ❌ Eliminar foto
        </button>

        <input id="location" placeholder="Ubicación (ej: a-1-n00)">

        <button onclick="saveItem()">💾 Guardar</button>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
